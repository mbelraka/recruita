# Recruita local infrastructure (PostgreSQL + Redis).
# Project name is fixed to `recruita` (containers: recruita-postgres, recruita-redis).
# Usage: npm run dev  (or: npm run infra:up && SPRING_PROFILES_ACTIVE=dev,persistence npm run start:backend)
name: recruita

services:
  postgres:
    image: postgres:16-alpine
    container_name: recruita-postgres
    environment:
      POSTGRES_DB: recruita
      POSTGRES_USER: recruita
      POSTGRES_PASSWORD: recruita
    ports:
      - '5432:5432'
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U recruita -d recruita']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: recruita-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  default:
    name: recruita

volumes:
  pg-data:
