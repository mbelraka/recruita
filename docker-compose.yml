# Local PostgreSQL + Redis for the persistence profile.
# Usage: npm run dev  (or: docker compose up -d && SPRING_PROFILES_ACTIVE=dev,persistence npm run start:backend)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: recruita
      POSTGRES_USER: recruita
      POSTGRES_PASSWORD: recruita
    ports:
      - '5432:5432'
    volumes:
      - recruita-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U recruita -d recruita']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  recruita-pg-data:
