<div class="root-container flex min-h-0 flex-1 justify-center">
  <div class="root-content flex min-h-0 flex-1 flex-col">
    <div
      animate.enter="fade-shell-enter"
      animate.leave="fade-shell-leave"
      class="header flex flex-row items-center justify-between"
    >
      <div class="header-leading flex flex-row items-center gap-8">
        <a
          [routerLink]="landingRoute"
          class="logo-link"
          [attr.aria-label]="'nav.main' | translate"
        >
          <span class="logo"></span>
        </a>

        <div class="nav-container">
          <nav
            mat-tab-nav-bar
            class="main-nav"
            [tabPanel]="tabPanel"
            disablePagination
            color="accent"
          >
            @for (link of navLinks; track link.link) {
              <a
                mat-tab-link
                class="tab-link"
                routerLinkActive
                #mainNavbar="routerLinkActive"
                [active]="mainNavbar.isActive"
                [routerLink]="link.link"
              >
                {{ link.translationKey | translate }}
              </a>
            }
          </nav>
          <mat-tab-nav-panel #tabPanel></mat-tab-nav-panel>
        </div>
      </div>

      <mat-form-field
        appearance="outline"
        class="select form-field--palette-secondary language-select-form-field"
        subscriptSizing="dynamic"
      >
        <mat-icon matPrefix aria-hidden="true">language</mat-icon>
        <mat-select
          panelClass="select-panel--palette-secondary"
          [attr.aria-label]="'language.label' | translate"
          [value]="selectedLanguage"
          (selectionChange)="onLanguageChange($event.value)"
        >
          @for (lang of sortedSupportedLanguages; track lang) {
            <mat-option [value]="lang">
              {{ getLanguageLabel(lang) }}
            </mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>

    <div class="full-container min-h-0 flex-1">
      <router-outlet></router-outlet>
    </div>
    <footer
      animate.enter="fade-shell-enter"
      animate.leave="fade-shell-leave"
      class="footer flex flex-row flex-nowrap items-center justify-center gap-3"
    >
      <span>{{ 'footer.copyright' | translate }}</span>
      <a class="footer__privacy" routerLink="/privacy">{{
        'footer.privacy' | translate
      }}</a>
    </footer>
  </div>
</div>
