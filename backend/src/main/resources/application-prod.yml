# Shared secrets: backend/.env (see backend/.env.example).
spring:
  config:
    import:
      - optional:file:.env
      - optional:classpath:application-profile-api.yml

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

recruita:
  runtime:
    production-mode: production
    suppress-error-detail: true
