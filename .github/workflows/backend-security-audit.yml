name: Backend dependency audit

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  owasp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version-file: backend/.java-version
          cache: maven
          cache-dependency-path: backend/pom.xml

      - uses: ./.github/actions/setup-node-toolchain
        with:
          npm-ci: true

      - name: Cache OWASP NVD data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-dc12.2.2-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-dc12.2.2-
            owasp-nvd-${{ runner.os }}-

      - name: OWASP dependency check
        run: npm run security:audit:backend
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
