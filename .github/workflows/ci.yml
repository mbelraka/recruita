name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      lockfile: ${{ steps.filter.outputs.lockfile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'patches/**'
            backend:
              - 'backend/**'
            lockfile:
              - 'package.json'
              - 'package-lock.json'

  lockfile:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.lockfile == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-toolchain
      - name: Verify package-lock.json matches package.json
        run: npm run lockfile:check

  frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.lockfile == 'true' ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-toolchain
        with:
          cache-npm: true
          npm-ci: true
      - name: Frontend CI
        run: npm run validate:ci:frontend

  backend:
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-toolchain
        with:
          npm-ci: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version-file: backend/.java-version
          cache: maven
          cache-dependency-path: |
            backend/pom.xml
            backend/.mvn/wrapper/maven-wrapper.properties
      - name: Backend CI
        run: npm run validate:ci:backend
